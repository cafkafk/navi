[book]
title = "The Navi Manual"
authors = ["Christina Sørensen"]
description = "NixOS deployment tool with a persistent daemon, integrated provisioning, and a fleet management TUI."
language = "en"
src = "src"

[build]
build-dir = "book"
create-missing = false

[output.html]
default-theme = "rust"
preferred-dark-theme = "ayu"
git-repository-url = "https://github.com/cafkafk/navi"
edit-url-template = "https://github.com/cafkafk/navi/edit/main/docs/{path}"
no-section-label = true

[output.html.fold]
enable = true
level = 1

[output.html.search]
enable = true
